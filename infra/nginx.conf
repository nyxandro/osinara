events {}

http {
  # Docker's embedded DNS tracks service containers recreated under the same Compose name.
  resolver 127.0.0.11 valid=10s ipv6=off;

  upstream eve_agent {
    # Shared state and `resolve` let workers replace a stale container address without a reload.
    zone eve_agent 64k;
    server agent:3000 resolve;
  }

  server {
    listen 80;
    client_max_body_size 50m;
    server_tokens off;

    # Telegram is the only public user channel in the current deployment.
    location = /eve/v1/telegram {
      proxy_http_version 1.1;
      proxy_buffering off;
      proxy_read_timeout 3600s;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://eve_agent;
    }

    # Google uses one fixed GET callback; all session binding comes from one-time state in PostgreSQL.
    location = /eve/v1/google-oauth/callback {
      limit_except GET { deny all; }
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://eve_agent;
    }

    # Health remains public for Docker, Funnel, and future uptime checks.
    location = /eve/v1/health {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://eve_agent;
    }

    # Eve workflow callbacks must remain reachable for durable session execution.
    location ^~ /.well-known/workflow/ {
      proxy_http_version 1.1;
      proxy_buffering off;
      proxy_read_timeout 3600s;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://eve_agent;
    }

    # Do not expose Eve's root UI or session API through the public Funnel.
    location / {
      return 404;
    }
  }
}
